# The Docker image that will be used to build your app
image: node:lts
create-pages:
  pages:
    # The folder that contains the files to be exposed at the Page URL
    publish: public
  rules:
    # This ensures that only pushes to the default branch will trigger
    # a pages deploy
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  # Functions that should be executed before the build script is run
  before_script:
    - 'echo "Arquivos já estão na pasta public, nada a
      copiar."   artifacts:     paths:       - public   only:     - main Assim o
      job vai rodar sem erro.  Quer que eu te monte um exemplo completo de
      pipeline para um projeto Node/Phaser que gera o build automaticamente e
      publica no GitLab Pages?'
