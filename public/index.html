<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta a página para dispositivos móveis -->

    <title>Cobasi Shelter</title> <!-- Título da aba do navegador -->
    <link rel="icon" type="image/png" href="assets/logoJogo.png"> <!-- Ícone da aba (favicon) -->

    <!-- Importa o arquivo principal do jogo (main.js) como módulo -->
